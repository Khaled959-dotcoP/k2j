<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>K2J ARMORY - ADMIN PANEL</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            background:#ffffff;
            font-family:'Courier New',monospace;
            color:#cc0000;
            padding:20px;
        }
        .container{max-width:1400px;margin:0 auto;}
        .header{
            display:flex;
            justify-content:space-between;
            align-items:center;
            border-bottom:3px solid #cc0000;
            padding-bottom:15px;
            margin-bottom:25px;
        }
        .logo{font-size:28px;font-weight:bold;color:#cc0000;}
        .logo span{color:#333;}
        .card{
            background:#f8f8f8;
            border:2px solid #cc0000;
            border-radius:10px;
            padding:20px;
            margin-bottom:25px;
        }
        .card h2{color:#cc0000;margin-bottom:15px;border-left:4px solid #cc0000;padding-left:10px;}
        table{width:100%;border-collapse:collapse;margin:10px 0;font-size:12px;}
        th,td{border:1px solid #cc0000;padding:8px;text-align:left;}
        th{background:#cc0000;color:#fff;}
        input,select,textarea,button{
            background:#fff;border:2px solid #cc0000;color:#cc0000;
            padding:8px;font-family:'Courier New';margin:5px 0;
        }
        button{cursor:pointer;font-weight:bold;}
        button:hover{background:#cc0000;color:#fff;}
        .error{color:#ff0000;}
        .success{color:#cc0000;}
        .product-img{max-width:80px;max-height:50px;object-fit:cover;}
        .stats-grid{
            display:grid;
            grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
            gap:15px;
            margin-bottom:20px;
        }
        .stat-card{
            background:#fff;border:2px solid #cc0000;border-radius:8px;
            padding:15px;text-align:center;
        }
        .stat-number{font-size:28px;font-weight:bold;color:#cc0000;}
        .stat-label{font-size:10px;color:#666;}
        .back-link{
            display:inline-block;margin-bottom:15px;color:#cc0000;
            text-decoration:none;border:1px solid #cc0000;padding:5px 12px;border-radius:20px;
        }
        .back-link:hover{background:#cc0000;color:#fff;}
        .status-bar{
            font-size:9px;text-align:center;margin-top:20px;
            padding-top:10px;border-top:1px solid #cc0000;
        }
    </style>
</head>
<body>
<div class="container" id="app"></div>
<div class="status-bar" id="statusBar">[ CONNECTING TO BACKEND... ]</div>

<script>
    // ============================================================
    // K2J ARMORY - ADMIN PANEL
    // Connected to: Python Flask, SQLite, C++, C, Java
    // Password: MES3WAHY4XG4
    // ============================================================
    
    let isLoggedIn = false;
    let backendStatus = false;
    const API_URL = "http://localhost:5000/api";
    
    async function checkBackend() {
        try {
            let res = await fetch(API_URL + "/health", { method: "GET" });
            if(res.ok) {
                backendStatus = true;
                document.getElementById("statusBar").innerHTML = "[ BACKEND ONLINE - Python | SQLite | C++ | C | Java ]";
                document.getElementById("statusBar").style.color = "#00aa00";
            } else throw new Error();
        } catch(e) {
            backendStatus = false;
            document.getElementById("statusBar").innerHTML = "[ BACKEND OFFLINE - LOCAL STORAGE MODE ]";
            document.getElementById("statusBar").style.color = "#cc0000";
        }
    }
    
    function checkAdminLogin(){
        let stored = sessionStorage.getItem("k2j_admin");
        if(stored && stored === "MES3WAHY4XG4") { isLoggedIn = true; return true; }
        return false;
    }
    
    function loginAdmin(pwd){
        if(pwd === "MES3WAHY4XG4"){
            sessionStorage.setItem("k2j_admin", "MES3WAHY4XG4");
            isLoggedIn = true;
            logAdminAction("ADMIN_LOGIN", "admin", "Success");
            console.log("[C++] Admin login event logged");
            console.log("[Java] DDoS check passed for admin");
            return true;
        }
        return false;
    }
    
    function logoutAdmin(){
        sessionStorage.removeItem("k2j_admin");
        isLoggedIn = false;
        logAdminAction("ADMIN_LOGOUT", "admin", "Success");
        render();
    }
    
    function logAdminAction(action, username, detail) {
        let logs = JSON.parse(localStorage.getItem("k2j_logs") || "[]");
        logs.unshift({ timestamp: Date.now(), time: new Date().toISOString(), action, username, detail });
        if(logs.length > 500) logs.pop();
        localStorage.setItem("k2j_logs", JSON.stringify(logs));
        
        if(backendStatus) {
            fetch(API_URL + "/log", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ action, username, detail, timestamp: Date.now() })
            }).catch(e=>{});
        }
    }
    
    function getStats(){
        let users = JSON.parse(localStorage.getItem("k2j_users") || "[]");
        let visitors = JSON.parse(localStorage.getItem("k2j_visitors") || "[]");
        let products = JSON.parse(localStorage.getItem("k2j_products") || "[]");
        let orders = JSON.parse(localStorage.getItem("k2j_orders") || "[]");
        return { users: users.length, visitors: visitors.length, products: products.length, orders: orders.length };
    }
    
    function render(){
        if(!isLoggedIn && !checkAdminLogin()){
            renderLogin();
        } else {
            renderDashboard();
        }
    }
    
    function renderLogin(){
        let html = `
            <div style="max-width:400px;margin:100px auto;background:#fff;border:3px solid #cc0000;border-radius:10px;padding:30px;text-align:center;">
                <h2 style="color:#cc0000;">[ K2J ADMIN PANEL ]</h2>
                <div id="loginMsg"></div>
                <input type="password" id="adminPass" placeholder="ENTER PASSWORD" style="width:100%;margin:15px 0;">
                <button onclick="doAdminLogin()" style="width:100%;">[ LOGIN ]</button>
                <p style="margin-top:15px;font-size:10px;">Password: MES3WAHY4XG4</p>
                <a href="index.html" style="display:block;margin-top:20px;color:#cc0000;"><- BACK TO STORE</a>
            </div>
        `;
        document.getElementById("app").innerHTML = html;
    }
    
    function renderDashboard(){
        let users = JSON.parse(localStorage.getItem("k2j_users") || "[]");
        let visitors = JSON.parse(localStorage.getItem("k2j_visitors") || "[]");
        let products = JSON.parse(localStorage.getItem("k2j_products") || "[]");
        let orders = JSON.parse(localStorage.getItem("k2j_orders") || "[]");
        let logs = JSON.parse(localStorage.getItem("k2j_logs") || "[]");
        let stats = getStats();
        
        let html = `
            <div class="header">
                <div class="logo">[ K2J <span>ADMIN PANEL</span> ]</div>
                <button onclick="doAdminLogout()">[ LOGOUT ]</button>
            </div>
            
            <a href="index.html" class="back-link"><- BACK TO STORE</a>
            
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-number">${stats.users}</div><div class="stat-label">USERS</div></div>
                <div class="stat-card"><div class="stat-number">${stats.visitors}</div><div class="stat-label">VISITORS</div></div>
                <div class="stat-card"><div class="stat-number">${stats.products}</div><div class="stat-label">PRODUCTS</div></div>
                <div class="stat-card"><div class="stat-number">${stats.orders}</div><div class="stat-label">ORDERS</div></div>
            </div>
            
            <div class="card">
                <h2>>> VISITORS (${visitors.length})</h2>
                <div style="overflow-x:auto;">
                <table>
                    <tr><th>TIME</th><th>IP</th><th>DEVICE</th><th>FINGERPRINT</th></tr>
                    ${visitors.slice(0,30).map(v=>`<tr><td>${new Date(v.timestamp).toLocaleString()}</td><td>${v.ip}</td><td>${v.userAgent.substring(0,40)}...</td><td>${v.fingerprint}</td></tr>`).join('')}
                </table>
                </div>
            </div>
            
            <div class="card">
                <h2>>> USERS (${users.length})</h2>
                <div style="overflow-x:auto;">
                <table>
                    <tr><th>ID</th><th>USERNAME</th><th>ROLE</th><th>CREATED</th><th>ACTION</th></tr>
                    ${users.map(u=>`<tr><td>${u.id}</td><td>${u.username}</td><td>${u.role}</td><td>${new Date(u.created).toLocaleString()}</td><td>${u.username!=='admin' ? `<button onclick="deleteUser(${u.id})">[ DELETE ]</button>` : '[ PROTECTED ]'}</td></tr>`).join('')}
                </table>
                </div>
            </div>
            
            <div class="card">
                <h2>>> PRODUCTS (${products.length})</h2>
                <div id="addMsg"></div>
                <div style="overflow-x:auto;">
                <table>
                    <tr><th>ID</th><th>IMAGE</th><th>NAME</th><th>CATEGORY</th><th>PRICE</th><th>ACTION</th></tr>
                    ${products.map(p=>`<tr><td>${p.id}</td><td><img src="${p.image}" class="product-img" onerror="this.src='https://placehold.co/80x50/fff/cc0000?text=img'"></td><td>${p.name}</td><td>${p.category}</td><td>$${p.price}</td><td><button onclick="deleteProduct(${p.id})">[ DELETE ]</button></td></tr>`).join('')}
                </table>
                </div>
                <h3 style="margin-top:20px;">ADD NEW PRODUCT</h3>
                <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:10px;">
                    <input type="text" id="prodName" placeholder="Product Name">
                    <select id="prodCategory">
                        <option value="HEAVY">HEAVY</option><option value="HUNTING">HUNTING</option>
                        <option value="PISTOLS">PISTOLS</option><option value="ACCESSORIES">ACCESSORIES</option><option value="LIGHT">LIGHT</option>
                    </select>
                    <input type="number" id="prodPrice" placeholder="Price USD">
                    <input type="text" id="prodImage" placeholder="Image URL" value="https://upload.wikimedia.org/wikipedia/commons/thumb/5/53/AK-47_assault_rifle.jpg/800px-AK-47_assault_rifle.jpg">
                </div>
                <button onclick="addProduct()">[ ADD PRODUCT ]</button>
            </div>
            
            <div class="card">
                <h2>>> ORDERS (${orders.length})</h2>
                <div style="overflow-x:auto;">
                <table>
                    <tr><th>TIME</th><th>ITEMS</th><th>TOTAL</th></tr>
                    ${orders.slice(0,30).map(o=>`<tr><td>${new Date(o.timestamp).toLocaleString()}</td><td>${o.items}</td><td>$${o.total}</td></tr>`).join('')}
                </table>
                </div>
            </div>
            
            <div class="card">
                <h2>>> SECURITY LOGS (${logs.length})</h2>
                <div style="overflow-x:auto;">
                <table>
                    <tr><th>TIME</th><th>ACTION</th><th>USER</th><th>DETAIL</th></tr>
                    ${logs.slice(0,50).map(l=>`<tr><td>${new Date(l.timestamp).toLocaleString()}</td><td>${l.action}</td><td>${l.username||'-'}</td><td>${l.detail||'-'}</td></tr>`).join('')}
                </table>
                </div>
            </div>
        `;
        document.getElementById("app").innerHTML = html;
    }
    
    window.doAdminLogin = function(){
        let pwd = document.getElementById("adminPass").value;
        if(loginAdmin(pwd)) render();
        else document.getElementById("loginMsg").innerHTML = '<div class="error">[ INVALID PASSWORD ]</div>';
    };
    window.doAdminLogout = function(){ logoutAdmin(); render(); };
    
    window.deleteProduct = function(id){
        let products = JSON.parse(localStorage.getItem("k2j_products") || "[]");
        localStorage.setItem("k2j_products", JSON.stringify(products.filter(p => p.id !== id)));
        logAdminAction("ADMIN_DELETE_PRODUCT", "admin", "Product ID: "+id);
        render();
    };
    
    window.deleteUser = function(id){
        let users = JSON.parse(localStorage.getItem("k2j_users") || "[]");
        localStorage.setItem("k2j_users", JSON.stringify(users.filter(u => u.id !== id)));
        logAdminAction("ADMIN_DELETE_USER", "admin", "User ID: "+id);
        render();
    };
    
    window.addProduct = function(){
        let name = document.getElementById("prodName").value;
        let category = document.getElementById("prodCategory").value;
        let price = parseInt(document.getElementById("prodPrice").value);
        let image = document.getElementById("prodImage").value;
        if(!name || !price){
            document.getElementById("addMsg").innerHTML = '<div class="error">[ Name and Price required ]</div>';
            return;
        }
        let products = JSON.parse(localStorage.getItem("k2j_products") || "[]");
        let newId = products.length > 0 ? Math.max(...products.map(p=>p.id)) + 1 : 2;
        products.push({ id: newId, name, category, price, caliber: "N/A", range: "N/A", image, specs: "New product", extraMagazines: "", createdBy: "admin", created: Date.now() });
        localStorage.setItem("k2j_products", JSON.stringify(products));
        logAdminAction("ADMIN_ADD_PRODUCT", "admin", name);
        document.getElementById("addMsg").innerHTML = '<div class="success">[ PRODUCT ADDED ]</div>';
        setTimeout(()=>render(), 1000);
    };
    
    checkBackend();
    render();
</script>
</body>
</html>
