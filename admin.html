<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>K2J ARMORY - ADMIN</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:#fff;font-family:'Courier New';color:#cc0000;padding:20px;}
        .container{max-width:1200px;margin:0 auto;}
        .header{display:flex;justify-content:space-between;border-bottom:3px solid #cc0000;padding-bottom:15px;margin-bottom:25px;}
        .card{background:#f8f8f8;border:2px solid #cc0000;border-radius:10px;padding:20px;margin-bottom:25px;}
        .card h2{color:#cc0000;margin-bottom:15px;border-left:4px solid #cc0000;padding-left:10px;}
        table{width:100%;border-collapse:collapse;font-size:12px;}
        th,td{border:1px solid #cc0000;padding:8px;text-align:left;}
        th{background:#cc0000;color:#fff;}
        input,button{background:#fff;border:2px solid #cc0000;color:#cc0000;padding:8px;margin:5px 0;}
        button{cursor:pointer;font-weight:bold;}
        button:hover{background:#cc0000;color:#fff;}
        .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:15px;margin-bottom:20px;}
        .stat-card{background:#fff;border:2px solid #cc0000;border-radius:8px;padding:15px;text-align:center;}
        .stat-number{font-size:28px;font-weight:bold;}
        .back-link{display:inline-block;margin-bottom:15px;color:#cc0000;text-decoration:none;border:1px solid #cc0000;padding:5px12px;border-radius:20px;}
    </style>
</head>
<body>
<div class="container" id="app"></div>
<script>
    const API = "http://localhost:5000/api";
    let loggedIn = false;
    let stats = { users: 0, visitors: 0, products: 0, orders: 0 };
    let users = [];
    let visitors = [];
    
    async function checkAuth() {
        let stored = sessionStorage.getItem("k2j_admin");
        if(stored === "MES3WAHY4XG4") loggedIn = true;
    }
    
    async function login(pwd) {
        if(pwd === "MES3WAHY4XG4") {
            sessionStorage.setItem("k2j_admin", "MES3WAHY4XG4");
            loggedIn = true;
            return true;
        }
        return false;
    }
    
    function logout() {
        sessionStorage.removeItem("k2j_admin");
        loggedIn = false;
        render();
    }
    
    async function loadData() {
        try {
            let s = await fetch(API+"/admin/stats").then(r=>r.json());
            stats = s;
            let u = await fetch(API+"/admin/users").then(r=>r.json());
            users = u.users || [];
            let v = await fetch(API+"/admin/visitors").then(r=>r.json());
            visitors = v.visitors || [];
        } catch(e) { console.log("Backend error"); }
    }
    
    async function addProduct() {
        let name = document.getElementById("pName").value;
        let category = document.getElementById("pCat").value;
        let price = parseInt(document.getElementById("pPrice").value);
        if(!name || !price) { alert("Name and price required"); return; }
        await fetch(API+"/admin/add_product", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name, category, price })
        });
        alert("Product added");
        location.reload();
    }
    
    async function deleteProduct(id) {
        if(confirm("Delete product?")) {
            await fetch(API+"/admin/delete_product/"+id, { method: "DELETE" });
            location.reload();
        }
    }
    
    function renderLogin() {
        document.getElementById("app").innerHTML = `
            <div style="max-width:400px;margin:100px auto;background:#fff;border:3px solid #cc0000;border-radius:10px;padding:30px;text-align:center;">
                <h2>[ ADMIN PANEL ]</h2>
                <input type="password" id="adminPass" placeholder="ENTER PASSWORD" style="width:100%;margin:15px 0;">
                <button onclick="doLogin()">[ LOGIN ]</button>
                <a href="index.html" style="display:block;margin-top:20px;color:#cc0000;"><- BACK</a>
            </div>
        `;
    }
    
    async function renderDashboard() {
        await loadData();
        let html = `
            <div class="header"><h2>[ K2J ADMIN PANEL ]</h2><button onclick="doLogout()">[ LOGOUT ]</button></div>
            <a href="index.html" class="back-link"><- BACK TO STORE</a>
            <div class="stats">
                <div class="stat-card"><div class="stat-number">${stats.users}</div><div>USERS</div></div>
                <div class="stat-card"><div class="stat-number">${stats.visitors}</div><div>VISITORS</div></div>
                <div class="stat-card"><div class="stat-number">${stats.products}</div><div>PRODUCTS</div></div>
                <div class="stat-card"><div class="stat-number">${stats.orders}</div><div>ORDERS</div></div>
            </div>
            <div class="card"><h2>>> USERS</h2>${users.map(u=>`<div>${u.username} (${u.role}) - ${new Date(u.created*1000).toLocaleString()}</div>`).join('')}</div>
            <div class="card"><h2>>> VISITORS</h2>${visitors.map(v=>`<div>${v.ip} | ${v.user_agent?.substring(0,50)} | ${new Date(v.timestamp*1000).toLocaleString()}</div>`).join('')}</div>
            <div class="card"><h2>>> ADD PRODUCT</h2>
                <input id="pName" placeholder="Name"><select id="pCat"><option>HEAVY</option><option>HUNTING</option><option>PISTOLS</option><option>ACCESSORIES</option><option>LIGHT</option></select>
                <input id="pPrice" placeholder="Price"><button onclick="addProduct()">[ ADD ]</button>
            </div>
        `;
        document.getElementById("app").innerHTML = html;
    }
    
    function render() {
        if(!loggedIn) renderLogin();
        else renderDashboard();
    }
    
    window.doLogin = async function() {
        let pwd = document.getElementById("adminPass").value;
        if(await login(pwd)) render();
        else alert("Wrong password");
    };
    window.doLogout = function() { logout(); render(); };
    window.addProduct = addProduct;
    window.deleteProduct = deleteProduct;
    
    checkAuth();
    render();
</script>
</body>
</html>
