                <p style="font-size:11px; margin-top:15px;">After sending Bitcoin, click the button above to notify seller.</p>
            </div>
        `;
        
        document.getElementById("app").innerHTML = html;
    }
    
    function completeOrderTelegram() {
        let total = getCartTotal();
        let items = cart.map(i => i.name + " x" + i.quantity).join(", ");
        
        sendTelegramOrder(items, total, cart.reduce((s,i)=>s+i.quantity,0));
        
        cart = [];
        saveCart();
        
        showNotification("[ORDER SENT] Telegram notification delivered");
        setTimeout(() => { goBack(); }, 2000);
    }
    
    // ==================== GLOBAL FUNCTIONS ====================
    window.setBrand = function(brand) {
        currentBrand = brand;
        renderHome();
    };
    
    window.addToCartFromGrid = function(productId) {
        let product = products.find(p => p.id === productId);
        if(product) addToCart(product);
    };
    
    window.showCart = function() { renderCartModal(); };
    window.closeCartModal = function() { 
        let modal = document.getElementById("cartModal");
        if(modal) modal.style.display = "none";
    };
    window.updateQuantity = updateQuantity;
    window.removeFromCart = removeFromCart;
    window.checkout = checkout;
    window.completeOrderTelegram = completeOrderTelegram;
    window.goBack = function() { renderHome(); };
    window.subscribe = function() {
        let email = document.getElementById("subscribeEmail")?.value;
        if(email && email.includes("@")) {
            showNotification("[SUBSCRIBED] " + email);
            logToDatabase("SUBSCRIBE", email);
            document.getElementById("subscribeEmail").value = "";
        } else {
            showNotification("[ERROR] Invalid email");
        }
    };
    
    // Initial render
    console.log("[K2J] System initialized - AK-47 Marketplace");
    console.log("[C++ Integrator] Active");
    console.log("[Java DDoS] Monitoring");
    logToDatabase("SYSTEM_START", "AK-47 Marketplace - Price: $400");
    
    renderHome();
</script>
