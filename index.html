<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>K2J Armory - Tactical Equipment</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:#0a0a0a;font-family:'Courier New',monospace;color:#0f0;padding:20px;}
        .container{max-width:1200px;margin:0 auto;}
        .card{background:#111;border:1px solid #0f0;border-radius:8px;padding:15px;margin:10px;}
        input,button,select{background:#000;border:1px solid #0f0;color:#0f0;padding:10px 15px;font-family:'Courier New';margin:5px;}
        button{cursor:pointer;}
        button:hover{background:#0f0;color:#000;}
        .filter-btn{background:#111;border:1px solid #0f0;padding:5px 15px;margin:3px;cursor:pointer;}
        .filter-btn.active{background:#0f0;color:#000;}
        .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px;margin-top:20px;}
        .product-img{width:100%;height:180px;object-fit:cover;border-radius:5px;}
        .ban-message{padding:100px;text-align:center;color:#f00;}
        .header{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #0f0;padding-bottom:15px;margin-bottom:20px;}
        .error{color:#f00;}
        .success{color:#0f0;}
    </style>
</head>
<body>
<div class="container" id="app"></div>

<script>
    // ============================================
    // K2J ARMORY - FULL ENGLISH FRONTEND
    // Chrome Block + Rate Limit + Database Connected
    // ============================================
    
    let currentUser = null;
    const API_BASE = "http://localhost:5000/api";
    
    // BLOCK GOOGLE CHROME
    const isChrome = /Chrome/.test(navigator.userAgent) && /Google Inc/.test(navigator.vendor);
    if(isChrome) {
        document.body.innerHTML = '<div class="ban-message"><h1>[ ACCESS DENIED ]</h1><p>Google Chrome is not supported. Please use Firefox, Edge, Opera, or Safari.</p><p>K2J Armory - Maximum Security</p></div>';
        throw new Error("Chrome blocked");
    }
    
    // Bot detection
    if(navigator.webdriver === true || /HeadlessChrome/.test(navigator.userAgent)) {
        document.body.innerHTML = '<div class="ban-message"><h1>[ BOT DETECTED ]</h1><p>Automated access is forbidden.</p></div>';
        throw new Error("Bot detected");
    }
    
    // Generate fingerprint
    let fingerprint = btoa(navigator.userAgent + navigator.language + screen.width + screen.height + screen.colorDepth);
    fingerprint = fingerprint.substring(0, 48);
    sessionStorage.setItem("fp", fingerprint);
    
    // Rate limiting check
    let requestTimes = JSON.parse(localStorage.getItem("k2j_requests") || "[]");
    let now = Date.now();
    requestTimes = requestTimes.filter(t => now - t < 3000);
    if(requestTimes.length > 5) {
        document.body.innerHTML = '<div class="ban-message"><h1>[ RATE LIMIT EXCEEDED ]</h1><p>Too many requests. You are temporarily banned.</p></div>';
        throw new Error("Rate limit exceeded");
    }
    requestTimes.push(now);
    localStorage.setItem("k2j_requests", JSON.stringify(requestTimes));
    
    // API Call Function
    async function apiCall(endpoint, data) {
        try {
            const response = await fetch(API_BASE + endpoint, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "X-Fingerprint": fingerprint
                },
                body: JSON.stringify(data)
            });
            return await response.json();
        } catch(e) {
            console.error("API Error:", e);
            return { success: false, error: "Connection failed" };
        }
    }
    
    // Render UI
    function render() {
        let html = '';
        
        if(!currentUser) {
            html = `
                <div style="text-align:center; padding:50px;">
                    <div style="border:2px solid #0f0; border-radius:10px; width:400px; margin:0 auto; padding:40px;">
                        <h1 style="margin-bottom:20px;">[ K2J ARMORY ]</h1>
                        <h3>>> LOGIN / REGISTER <<</h3>
                        <div id="authMsg" style="margin:10px 0;"></div>
                        <input type="text" id="regUser" placeholder="username (min 3 chars)" style="width:100%; margin:5px 0;"><br>
                        <input type="password" id="regPass" placeholder="password (min 4 chars)" style="width:100%; margin:5px 0;"><br>
                        <button onclick="register()" style="width:100%; margin:5px 0;">[ REGISTER ]</button>
                        <hr style="margin:15px 0; border-color:#0f0;">
                        <input type="text" id="loginUser" placeholder="username" style="width:100%; margin:5px 0;"><br>
                        <input type="password" id="loginPass" placeholder="password" style="width:100%; margin:5px 0;"><br>
                        <button onclick="login()" style="width:100%; margin:5px 0;">[ LOGIN ]</button>
                    </div>
                </div>
            `;
        } else {
            html = `
                <div class="header">
                    <h1>[ K2J ARMORY ]</h1>
                    <div>
                        <span style="color:#0f0;">${currentUser.username} (${currentUser.role})</span>
                        <button onclick="logout()" style="margin-left:15px;">[ LOGOUT ]</button>
                    </div>
                </div>
                <div style="margin-bottom:20px;">
                    <input type="text" id="searchInput" placeholder="search by seller or caliber..." style="width:300px;">
                    <select id="sortSelect">
                        <option value="default">FEATURED</option>
                        <option value="priceAsc">PRICE: LOW TO HIGH</option>
                        <option value="priceDesc">PRICE: HIGH TO LOW</option>
                    </select>
                </div>
                <div>
                    <span class="filter-btn active" data-type="all">ALL ITEMS</span>
                    <span class="filter-btn" data-type="rifle">RIFLES</span>
                    <span class="filter-btn" data-type="pistol">PISTOLS</span>
                    <span class="filter-btn" data-type="tactical">TACTICAL</span>
                    <span class="filter-btn" data-type="accessory">ACCESSORIES</span>
                </div>
                <div id="inventoryGrid" class="grid"></div>
            `;
        }
        
        document.getElementById("app").innerHTML = html;
        
        if(currentUser) {
            loadInventory();
            // Attach event listeners
            document.querySelectorAll(".filter-btn").forEach(btn => {
                btn.onclick = function() {
                    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
                    this.classList.add("active");
                    loadInventory();
                };
            });
            document.getElementById("searchInput").onkeyup = () => loadInventory();
            document.getElementById("sortSelect").onchange = () => loadInventory();
        }
    }
    
    // REGISTER - No email required, saves to database
    async function register() {
        const username = document.getElementById("regUser").value.trim();
        const password = document.getElementById("regPass").value;
        const msgDiv = document.getElementById("authMsg");
        
        if(username.length < 3) {
            msgDiv.innerHTML = '<span class="error">[ ERROR: Username must be at least 3 characters ]</span>';
            return;
        }
        if(password.length < 4) {
            msgDiv.innerHTML = '<span class="error">[ ERROR: Password must be at least 4 characters ]</span>';
            return;
        }
        
        const res = await apiCall("/auth/register", { username, password });
        if(res.success) {
            msgDiv.innerHTML = '<span class="success">[ REGISTRATION SUCCESSFUL! Please login. ]</span>';
            document.getElementById("regUser").value = "";
            document.getElementById("regPass").value = "";
        } else {
            msgDiv.innerHTML = '<span class="error">[ ERROR: Username already exists ]</span>';
        }
    }
    
    // LOGIN
    async function login() {
        const username = document.getElementById("loginUser").value.trim();
        const password = document.getElementById("loginPass").value;
        const msgDiv = document.getElementById("authMsg");
        
        if(!username || !password) {
            msgDiv.innerHTML = '<span class="error">[ ERROR: Please enter username and password ]</span>';
            return;
        }
        
        const res = await apiCall("/auth/login", { username, password });
        if(res.success) {
            currentUser = res.user;
            render();
        } else {
            msgDiv.innerHTML = '<span class="error">[ ERROR: Invalid username or password ]</span>';
        }
    }
    
    // LOAD INVENTORY
    async function loadInventory() {
        const type = document.querySelector(".filter-btn.active")?.getAttribute("data-type") || "all";
        const sort = document.getElementById("sortSelect")?.value || "default";
        const search = document.getElementById("searchInput")?.value || "";
        
        const res = await apiCall("/inventory/list", { type, sort, search });
        
        if(res.items && res.items.length > 0) {
            let html = '';
            for(let item of res.items) {
                html += `
                    <div class="card">
                        <img src="${item.img}" class="product-img" alt="product">
                        <div style="margin-top:10px;">
                            <span style="background:#0f0; color:#000; padding:2px 8px; font-size:12px;">[K2J]</span>
                            <h3 style="margin:10px 0;">$${item.price.toLocaleString()}</h3>
                            <p><strong>Caliber:</strong> ${item.caliber}</p>
                            <p><strong>Type:</strong> ${item.type} | <strong>Year:</strong> ${item.year}</p>
                            <p><strong>Seller:</strong> ${item.seller}</p>
                            <p><strong>Location:</strong> ${item.location}</p>
                        </div>
                    </div>
                `;
            }
            document.getElementById("inventoryGrid").innerHTML = html;
        } else {
            document.getElementById("inventoryGrid").innerHTML = '<p style="text-align:center;">[ NO ITEMS FOUND ]</p>';
        }
    }
    
    // LOGOUT
    function logout() {
        currentUser = null;
        render();
    }
    
    // Initialize
    render();
</script>
</body>
</html>
