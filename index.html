<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>K2J ARMORY</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:#fff;font-family:'Courier New',monospace;color:#cc0000;padding:20px;}
        .container{max-width:1200px;margin:0 auto;}
        .header{display:flex;justify-content:space-between;align-items:center;border-bottom:3px solid #cc0000;padding-bottom:15px;margin-bottom:25px;flex-wrap:wrap;}
        .logo{font-size:28px;font-weight:bold;color:#cc0000;}
        .logo span{color:#333;}
        .cart-icon{background:#fff;border:2px solid #cc0000;padding:8px 20px;border-radius:30px;cursor:pointer;color:#cc0000;font-weight:bold;}
        .cart-icon:hover{background:#cc0000;color:#fff;}
        .main-layout{display:flex;gap:30px;flex-wrap:wrap;}
        .sidebar{width:250px;flex-shrink:0;}
        .category-list{list-style:none;margin-top:15px;}
        .category-list li{padding:10px;margin:5px 0;border:2px solid #cc0000;cursor:pointer;text-align:center;color:#cc0000;font-weight:bold;}
        .category-list li.active{background:#cc0000;color:#fff;}
        .category-list li:hover{background:#cc0000;color:#fff;}
        .content{flex:1;min-width:300px;}
        .products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px;}
        .product-card{background:#f8f8f8;border:2px solid #cc0000;border-radius:8px;padding:15px;transition:0.2s;}
        .product-card:hover{transform:translateY(-3px);box-shadow:0 5px 15px rgba(204,0,0,0.2);}
        .product-img{width:100%;height:180px;object-fit:cover;border-radius:5px;margin-bottom:10px;border:1px solid #cc0000;}
        .product-title{font-size:16px;font-weight:bold;color:#cc0000;}
        .product-price{font-size:20px;color:#cc0000;margin:8px 0;font-weight:bold;}
        .product-specs{font-size:10px;color:#666;margin:5px 0;}
        .add-to-cart{background:#fff;border:2px solid #cc0000;color:#cc0000;padding:8px;cursor:pointer;width:100%;text-align:center;margin-top:10px;font-weight:bold;}
        .add-to-cart:hover{background:#cc0000;color:#fff;}
        button{background:#fff;border:2px solid #cc0000;color:#cc0000;padding:8px 15px;font-family:'Courier New';cursor:pointer;font-weight:bold;}
        button:hover{background:#cc0000;color:#fff;}
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:1000;justify-content:center;align-items:center;}
        .modal-content{background:#fff;border:3px solid #cc0000;border-radius:10px;padding:30px;max-width:500px;width:90%;color:#cc0000;}
        .cart-item{border-bottom:1px solid #ccc;padding:10px 0;display:flex;justify-content:space-between;}
        .total{font-size:18px;margin:15px 0;padding-top:10px;border-top:2px solid #cc0000;font-weight:bold;}
        .checkout-btn{width:100%;padding:10px;background:#cc0000;color:#fff;font-weight:bold;border:none;}
        .telegram-btn{background:#0088cc;color:white;border:none;}
        .auth-container{max-width:400px;margin:50px auto;background:#fff;border:3px solid #cc0000;border-radius:10px;padding:30px;text-align:center;}
        .auth-container input{width:100%;padding:10px;margin:10px 0;background:#fff;border:2px solid #cc0000;color:#cc0000;font-family:'Courier New';}
        .error{color:#ff0000;margin:10px 0;}
        .success{color:#cc0000;margin:10px 0;}
        .admin-link{position:fixed;bottom:15px;right:15px;background:#fff;border:2px solid #cc0000;padding:5px 12px;border-radius:20px;font-size:11px;text-decoration:none;color:#cc0000;font-weight:bold;}
        .admin-link:hover{background:#cc0000;color:#fff;}
        .status-bar{font-size:9px;text-align:center;margin-top:20px;padding-top:10px;border-top:1px solid #cc0000;color:#cc0000;}
    </style>
</head>
<body>
<div class="container" id="app"></div>
<a href="admin.html" class="admin-link" target="_blank">[ ADMIN PANEL ]</a>
<div class="status-bar" id="statusBar">[ BACKEND: CHECKING... ]</div>

<script>
    let currentUser = null;
    let backendOnline = false;
    const API = "http://localhost:5000/api";
    
    async function checkBackend() {
        try {
            let res = await fetch(API + "/health");
            if(res.ok) {
                backendOnline = true;
                document.getElementById("statusBar").innerHTML = "[ BACKEND ONLINE | SQLite ACTIVE | API READY ]";
                document.getElementById("statusBar").style.color = "#00aa00";
            } else throw new Error();
        } catch(e) {
            backendOnline = false;
            document.getElementById("statusBar").innerHTML = "[ BACKEND OFFLINE - USING LOCAL STORAGE ]";
            document.getElementById("statusBar").style.color = "#cc0000";
        }
    }
    
    async function apiCall(endpoint, data, method = "POST") {
        if(!backendOnline) {
            console.log("Backend offline, using localStorage fallback");
            return null;
        }
        try {
            let res = await fetch(API + endpoint, {
                method: method,
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            });
            return await res.json();
        } catch(e) {
            console.log("API call failed");
            return null;
        }
    }
    
    async function register(username, password) {
        if(username.length < 3) return { success: false, error: "Username min 3 chars" };
        if(password.length < 4) return { success: false, error: "Password min 4 chars" };
        
        let res = await apiCall("/auth/register", { username, password });
        if(res && res.success) return { success: true };
        
        // Fallback to localStorage
        let users = JSON.parse(localStorage.getItem("k2j_users") || "[]");
        if(users.find(u => u.username === username)) return { success: false, error: "Username exists" };
        users.push({ username, password: btoa(password), role: "user" });
        localStorage.setItem("k2j_users", JSON.stringify(users));
        return { success: true };
    }
    
    async function login(username, password) {
        let res = await apiCall("/auth/login", { username, password });
        if(res && res.success) {
            currentUser = res.user;
            sessionStorage.setItem("k2j_user", JSON.stringify(currentUser));
            return { success: true };
        }
        
        let users = JSON.parse(localStorage.getItem("k2j_users") || "[]");
        let user = users.find(u => u.username === username && u.password === btoa(password));
        if(user) {
            currentUser = { username: user.username, role: user.role || "user" };
            sessionStorage.setItem("k2j_user", JSON.stringify(currentUser));
            return { success: true };
        }
        return { success: false, error: "Invalid credentials" };
    }
    
    function logout() { currentUser = null; sessionStorage.removeItem("k2j_user"); render(); }
    function getCurrentUser() {
        if(currentUser) return currentUser;
        let stored = sessionStorage.getItem("k2j_user");
        if(stored) { currentUser = JSON.parse(stored); return currentUser; }
        return null;
    }
    
    function trackVisitor() {
        let visitor = {
            ip: "detecting",
            userAgent: navigator.userAgent,
            platform: navigator.platform,
            language: navigator.language,
            screen: screen.width + "x" + screen.height,
            timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
            fingerprint: generateFingerprint(),
            page: window.location.pathname
        };
        fetch('https://api.ipify.org?format=json').then(r=>r.json()).then(d=>{visitor.ip=d.ip;}).catch(()=>{});
        apiCall("/visitor/track", visitor);
        let visitors = JSON.parse(localStorage.getItem("k2j_visitors") || "[]");
        visitors.unshift(visitor);
        if(visitors.length > 200) visitors.pop();
        localStorage.setItem("k2j_visitors", JSON.stringify(visitors));
    }
    
    function generateFingerprint() {
        let data = navigator.userAgent + navigator.language + screen.width + screen.height;
        let hash = 0;
        for(let i=0;i<data.length;i++) hash = ((hash<<5)-hash)+data.charCodeAt(i);
        return "FP_"+Math.abs(hash).toString(16);
    }
    
    let cart = JSON.parse(localStorage.getItem("k2j_cart") || "[]");
    function saveCart() { localStorage.setItem("k2j_cart", JSON.stringify(cart)); }
    function addToCart(product) {
        let existing = cart.find(i=>i.id===product.id);
        if(existing) existing.quantity++;
        else cart.push({...product, quantity:1});
        saveCart();
        showNotification("Added: "+product.name);
    }
    function removeFromCart(id) { cart=cart.filter(i=>i.id!==id); saveCart(); renderCartModal(); }
    function updateQuantity(id, delta) {
        let item=cart.find(i=>i.id===id);
        if(item) { item.quantity+=delta; if(item.quantity<=0) cart=cart.filter(i=>i.id!==id); saveCart(); renderCartModal(); }
    }
    function getCartTotal() { return cart.reduce((s,i)=>s+(i.price*i.quantity),0); }
    function showNotification(msg) {
        let n=document.createElement('div');
        n.style.cssText='position:fixed;bottom:20px;right:20px;background:#cc0000;color:#fff;padding:8px16px;border-radius:5px;z-index:2000;';
        n.innerText=msg;
        document.body.appendChild(n);
        setTimeout(()=>n.remove(),2000);
    }
    
    function sendTelegramOrder(items, total) {
        let msg = "[NEW ORDER] K2J ARMORY\nITEMS: "+items+"\nTOTAL: $"+total+"\nPAYMENT: BITCOIN\nTIMESTAMP: "+new Date().toISOString();
        window.open("https://t.me/+905367089683?text="+encodeURIComponent(msg), '_blank');
        apiCall("/orders/create", { items, total, username: getCurrentUser()?.username });
        let orders=JSON.parse(localStorage.getItem("k2j_orders")||"[]");
        orders.unshift({id:Date.now(),items,total});
        localStorage.setItem("k2j_orders",JSON.stringify(orders));
    }
    
    let categories = ["HEAVY", "HUNTING", "PISTOLS", "ACCESSORIES", "LIGHT"];
    let currentCategory = "HEAVY";
    let products = [];
    
    async function loadProducts() {
        let res = await apiCall("/products/list", {}, "GET");
        if(res && res.products) {
            products = res.products;
        } else {
            products = JSON.parse(localStorage.getItem("k2j_products") || "[{\"id\":1,\"name\":\"AK-47\",\"category\":\"HEAVY\",\"price\":400,\"caliber\":\"7.62x39mm\",\"range\":\"350m\",\"image\":\"https://upload.wikimedia.org/wikipedia/commons/thumb/5/53/AK-47_assault_rifle.jpg/800px-AK-47_assault_rifle.jpg\",\"specs\":\"Legendary reliability\",\"extra\":\"2 x FULL MAGAZINES\"}]");
        }
        renderStore();
    }
    
    function getProductsByCategory(cat) {
        return products.filter(p => p.category === cat);
    }
    
    function render() {
        let user = getCurrentUser();
        if(!user) renderAuth();
        else renderStore();
    }
    
    function renderAuth() {
        let html = `
            <div class="auth-container">
                <h2 style="color:#cc0000;">[ K2J ARMORY ]</h2>
                <div id="authMsg"></div>
                <h3>>> REGISTER <<</h3>
                <input type="text" id="regUser" placeholder="username (min 3)">
                <input type="password" id="regPass" placeholder="password (min 4)">
                <button onclick="doRegister()">[ REGISTER ]</button>
                <h3 style="margin-top:20px;">>>> LOGIN <<</h3>
                <input type="text" id="loginUser" placeholder="username">
                <input type="password" id="loginPass" placeholder="password">
                <button onclick="doLogin()">[ LOGIN ]</button>
                <p style="margin-top:15px;font-size:10px;">Admin: admin / MES3WAHY4XG4</p>
            </div>
        `;
        document.getElementById("app").innerHTML = html;
    }
    
    function renderStore() {
        let user = getCurrentUser();
        let cartCount = cart.reduce((s,i)=>s+i.quantity,0);
        let prods = getProductsByCategory(currentCategory);
        
        let html = `
            <div class="header">
                <div class="logo">[ K2J <span>ARMORY</span> ]</div>
                <div>
                    <span style="margin-right:15px;">USER: ${user.username} (${user.role})</span>
                    <button onclick="doLogout()" style="margin-right:10px;">[ LOGOUT ]</button>
                    <div class="cart-icon" onclick="showCart()">[ CART ] (${cartCount})</div>
                </div>
            </div>
            <div class="main-layout">
                <div class="sidebar">
                    <h3>CATEGORIES</h3>
                    <ul class="category-list">
                        ${categories.map(cat => `<li class="${currentCategory===cat?'active':''}" onclick="setCategory('${cat}')">[ ${cat} ]</li>`).join('')}
                    </ul>
                </div>
                <div class="content">
                    <div class="products-grid">
                        ${prods.length === 0 ? '<p style="text-align:center;padding:50px;">[ NO ITEMS ]</p>' : 
                            prods.map(p => `
                                <div class="product-card">
                                    <img src="${p.image}" class="product-img" onerror="this.src='https://placehold.co/600x400/fff/cc0000?text=AK-47'">
                                    <div class="product-title">${p.name}</div>
                                    <div class="product-price">$ ${p.price} USD</div>
                                    <div class="product-specs">${p.specs || "Caliber: "+p.caliber}</div>
                                    ${p.extra ? `<div class="product-specs" style="color:#cc0000;">[ ${p.extra} ]</div>` : ''}
                                    <div class="add-to-cart" onclick="addToCartFromUI(${p.id})">[ ADD TO CART ]</div>
                                </div>
                            `).join('')
                        }
                    </div>
                </div>
            </div>
        `;
        document.getElementById("app").innerHTML = html;
    }
    
    function renderCartModal() {
        let modal = document.getElementById("cartModal");
        if(!modal){ let m=document.createElement('div');m.id="cartModal";m.className="modal";document.body.appendChild(m);modal=m;}
        if(cart.length===0){
            modal.innerHTML=`<div class="modal-content"><h2>[ CART ]</h2><p>Empty</p><button onclick="closeCartModal()">[ CLOSE ]</button></div>`;
            modal.style.display="flex";return;
        }
        let itemsHtml=cart.map(i=>`<div class="cart-item"><div><strong>${i.name}</strong><br>$${i.price} x ${i.quantity}</div><div><button onclick="updateQuantity(${i.id},-1)">-</button><span>${i.quantity}</span><button onclick="updateQuantity(${i.id},1)">+</button><button onclick="removeFromCart(${i.id})">[X]</button></div></div>`).join('');
        let total=getCartTotal();
        modal.innerHTML=`<div class="modal-content"><h2>[ CART ]</h2>${itemsHtml}<div class="total">TOTAL: $${total}</div><button class="checkout-btn" onclick="checkout()">[ CHECKOUT - BITCOIN ]</button><button onclick="closeCartModal()">[ CLOSE ]</button></div>`;
        modal.style.display="flex";
    }
    
    function checkout(){
        closeCartModal();
        let total=getCartTotal();
        let html=`
            <div class="header"><div class="logo">[ K2J ARMORY ]</div><div><button onclick="goBack()"><-- BACK</button></div></div>
            <div style="max-width:500px;margin:20px auto;background:#fff;border:3px solid #cc0000;padding:20px;border-radius:10px;">
                <h2>BITCOIN CHECKOUT</h2>
                <div>${cart.map(i=>`<p>${i.name} x${i.quantity} = $${i.price*i.quantity}</p>`).join('')}<h3>TOTAL: $${total}</h3></div>
                <p>Send BTC to: <strong>bc1qxy2kgdygjrsqtzq2n0yrf2493p83kkfjhx0wlh</strong></p>
                <button class="telegram-btn" onclick="confirmOrder()" style="margin-top:15px;">[ CONFIRM VIA TELEGRAM ]</button>
            </div>
        `;
        document.getElementById("app").innerHTML=html;
    }
    
    function confirmOrder(){
        let total=getCartTotal();
        let items=cart.map(i=>i.name+" x"+i.quantity).join(", ");
        sendTelegramOrder(items,total);
        cart=[];saveCart();
        showNotification("Order sent!");
        setTimeout(()=>{ goBack(); renderStore(); },1500);
    }
    
    window.doRegister = async function(){
        let u=document.getElementById("regUser").value;
        let p=document.getElementById("regPass").value;
        let res=await register(u,p);
        let msgDiv=document.getElementById("authMsg");
        if(res.success) msgDiv.innerHTML='<div class="success">[ Registered! Please login ]</div>';
        else msgDiv.innerHTML='<div class="error">[ '+res.error+' ]</div>';
    };
    window.doLogin = async function(){
        let u=document.getElementById("loginUser").value;
        let p=document.getElementById("loginPass").value;
        let res=await login(u,p);
        let msgDiv=document.getElementById("authMsg");
        if(res.success) { await loadProducts(); render(); }
        else msgDiv.innerHTML='<div class="error">[ '+res.error+' ]</div>';
    };
    window.doLogout = function(){ logout(); render(); };
    window.setCategory = function(cat){ currentCategory=cat; renderStore(); };
    window.addToCartFromUI = function(id){
        let p = products.find(x=>x.id==id);
        if(p) addToCart(p);
    };
    window.showCart = renderCartModal;
    window.closeCartModal = function(){ let m=document.getElementById("cartModal"); if(m) m.style.display="none"; };
    window.updateQuantity = updateQuantity;
    window.removeFromCart = removeFromCart;
    window.checkout = checkout;
    window.confirmOrder = confirmOrder;
    window.goBack = function(){ renderStore(); };
    
    checkBackend();
    trackVisitor();
    loadProducts();
    render();
</script>
</body>
</html>
