<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>K2J ARMORY - AK-47</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            background:#ffffff;
            font-family:'Courier New',monospace;
            color:#000000;
            padding:20px;
        }
        .container{
            max-width:1200px;
            margin:0 auto;
        }
        .header{
            display:flex;
            justify-content:space-between;
            align-items:center;
            border-bottom:2px solid #000;
            padding-bottom:15px;
            margin-bottom:30px;
            flex-wrap:wrap;
        }
        .logo{
            font-size:28px;
            font-weight:bold;
            color:#000;
        }
        .logo span{color:#888;}
        .cart-icon{
            background:#fff;
            border:2px solid #000;
            padding:8px 20px;
            border-radius:30px;
            cursor:pointer;
            transition:0.2s;
            font-weight:bold;
        }
        .cart-icon:hover{
            background:#000;
            color:#fff;
        }
        
        .products-grid{
            display:grid;
            grid-template-columns:1fr;
            gap:25px;
            margin-bottom:40px;
            max-width:600px;
            margin-left:auto;
            margin-right:auto;
        }
        .product-card{
            background:#f5f5f5;
            border:2px solid #000;
            border-radius:10px;
            padding:25px;
            transition:0.2s;
        }
        .product-card:hover{
            transform:translateY(-3px);
            box-shadow:0 5px 15px rgba(0,0,0,0.1);
        }
        .product-img{
            width:100%;
            height:250px;
            background:#e0e0e0;
            border-radius:8px;
            display:flex;
            align-items:center;
            justify-content:center;
            margin-bottom:15px;
            overflow:hidden;
        }
        .product-img img{
            width:100%;
            height:100%;
            object-fit:cover;
        }
        .product-title{
            font-size:22px;
            font-weight:bold;
            margin-bottom:8px;
            color:#000;
        }
        .product-price{
            font-size:26px;
            color:#000;
            margin-bottom:15px;
            font-weight:bold;
        }
        .product-detail{
            font-size:12px;
            color:#555;
            margin-bottom:5px;
        }
        .specs-list{
            margin:15px 0;
            padding-left:20px;
        }
        .specs-list li{
            font-size:11px;
            color:#444;
            margin:5px 0;
        }
        .add-to-cart{
            background:#fff;
            border:2px solid #000;
            color:#000;
            padding:10px 15px;
            margin-top:15px;
            cursor:pointer;
            width:100%;
            text-align:center;
            border-radius:5px;
            transition:0.2s;
            font-family:'Courier New';
            font-weight:bold;
        }
        .add-to-cart:hover{
            background:#000;
            color:#fff;
        }
        button{
            background:#fff;
            border:2px solid #000;
            color:#000;
            padding:10px 20px;
            font-family:'Courier New';
            cursor:pointer;
            transition:0.2s;
            font-weight:bold;
        }
        button:hover{
            background:#000;
            color:#fff;
        }
        .modal{
            display:none;
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background:rgba(0,0,0,0.9);
            z-index:1000;
            justify-content:center;
            align-items:center;
        }
        .modal-content{
            background:#fff;
            border:3px solid #000;
            border-radius:10px;
            padding:30px;
            max-width:500px;
            width:90%;
            max-height:80vh;
            overflow-y:auto;
            color:#000;
        }
        .cart-item{
            border-bottom:1px solid #ccc;
            padding:10px 0;
            display:flex;
            justify-content:space-between;
        }
        .total{
            font-size:20px;
            margin:15px 0;
            padding-top:10px;
            border-top:2px solid #000;
            font-weight:bold;
        }
        .checkout-btn{
            width:100%;
            padding:12px;
            background:#000;
            color:#fff;
            font-weight:bold;
            border:none;
        }
        .telegram-btn{
            background:#0088cc;
            border-color:#0088cc;
            color:white;
        }
        .back-btn{
            margin-bottom:20px;
            display:inline-block;
        }
        hr{
            border-color:#ccc;
            margin:15px 0;
        }
        .feature-box{
            background:#f0f0f0;
            border:1px solid #000;
            padding:15px;
            margin:15px 0;
            border-radius:8px;
        }
        @media (max-width:700px){
            .products-grid{grid-template-columns:1fr;}
            body{padding:10px;}
        }
    </style>
</head>
<body>
<div class="container" id="app"></div>

<script>
    // =================================================================
    // K2J ARMORY - DARK WEB THEME (BLACK + WHITE)
    // ONLY AK-47 LISTING - $400 WITH 2 FULL MAGAZINES
    // ALL BOTTOM TEXTS REMOVED (NO C++ FILTER, NO INTEGRATION STATUS)
    // =================================================================
    
    // ==================== SECURITY LAYERS ====================
    if(/Chrome/.test(navigator.userAgent) && /Google Inc/.test(navigator.vendor)){
        document.body.innerHTML = '<div style="padding:100px;text-align:center;color:#f00"><h1>[ ACCESS DENIED ]</h1><p>Google Chrome is not supported.</p><p>Please use Firefox, Edge, Opera, or Safari.</p></div>';
        throw new Error("Chrome blocked");
    }
    
    if(navigator.webdriver === true || /HeadlessChrome/.test(navigator.userAgent)){
        document.body.innerHTML = '<div style="padding:100px;text-align:center;color:#f00"><h1>[ BOT DETECTED ]</h1><p>Automated access forbidden.</p></div>';
        throw new Error("Bot detected");
    }
    
    let requestTimes = JSON.parse(localStorage.getItem("k2j_requests") || "[]");
    let nowTime = Date.now();
    requestTimes = requestTimes.filter(t => nowTime - t < 3000);
    if(requestTimes.length > 10) {
        document.body.innerHTML = '<div style="padding:100px;text-align:center;color:#f00"><h1>[ RATE LIMIT EXCEEDED ]</h1></div>';
        throw new Error("Rate limit exceeded");
    }
    requestTimes.push(nowTime);
    localStorage.setItem("k2j_requests", JSON.stringify(requestTimes));
    
    function generateFingerprint() {
        let data = navigator.userAgent + navigator.language + screen.width + screen.height;
        let hash = 0;
        for(let i = 0; i < data.length; i++) {
            hash = ((hash << 5) - hash) + data.charCodeAt(i);
            hash |= 0;
        }
        return "FP_" + Math.abs(hash).toString(16);
    }
    
    let fingerprint = generateFingerprint();
    sessionStorage.setItem("k2j_fingerprint", fingerprint);
    
    let bannedList = JSON.parse(localStorage.getItem("k2j_banned") || "[]");
    if(bannedList.includes(fingerprint)) {
        document.body.innerHTML = '<div style="padding:100px;text-align:center;color:#f00"><h1>[ YOU ARE BANNED ]</h1></div>';
        throw new Error("Banned");
    }
    
    function getTimestamp() {
        return new Date().toISOString();
    }
    
    // ==================== DATABASE ====================
    if(!localStorage.getItem("k2j_users")) {
        localStorage.setItem("k2j_users", JSON.stringify([{ id: 1, username: "admin", password: "8c6976e5b5410415bde908bd4dee15dfb167a9c873fc4bb8a81f6f2ab448a918", role: "admin" }]));
    }
    if(!localStorage.getItem("k2j_orders")) localStorage.setItem("k2j_orders", JSON.stringify([]));
    
    // ==================== PRODUCTS (ONLY AK-47) ====================
    let products = [
        {
            id: 1,
            name: "AK-47",
            fullName: "Avtomat Kalashnikova 1947",
            caliber: "7.62x39mm",
            effectiveRange: "350 meters",
            maximumRange: "1500 meters",
            muzzleVelocity: "715 m/s (2,350 ft/s)",
            fireRate: "600 rounds per minute",
            magazineCapacity: "30 rounds",
            extraMagazines: "2 x FULL 30-ROUND MAGAZINES INCLUDED",
            weight: "3.47 kg (empty) / 4.3 kg (loaded)",
            length: "870 mm (34.3 in)",
            price: 400,
            description: "The legendary AK-47 assault rifle. Battle-proven reliability in all conditions. Comes with TWO (2) fully loaded 30-round magazines. Chrome-lined barrel for durability. Stamped steel receiver with authentic markings.",
            image: "https://upload.wikimedia.org/wikipedia/commons/thumb/5/53/AK-47_assault_rifle.jpg/800px-AK-47_assault_rifle.jpg",
            specifications: [
                "Caliber: 7.62x39mm",
                "Effective Range: 350 meters",
                "Maximum Range: 1500 meters",
                "Muzzle Velocity: 715 m/s",
                "Rate of Fire: 600 rounds/min",
                "Magazine Capacity: 30 rounds",
                "TWO FULL MAGAZINES INCLUDED",
                "Weight: 3.47 kg (empty)",
                "Length: 870 mm",
                "Barrel Length: 415 mm",
                "Action: Gas-operated, rotating bolt",
                "Sights: Adjustable iron sights"
            ],
            includes: [
                "1x AK-47 Rifle",
                "2x Fully Loaded 30-round Magazines",
                "1x Cleaning Kit",
                "1x Sling",
                "1x Oil Bottle",
                "1x Manual"
            ]
        }
    ];
    
    // ==================== CART ====================
    let cart = JSON.parse(localStorage.getItem("k2j_cart") || "[]");
    
    function saveCart() {
        localStorage.setItem("k2j_cart", JSON.stringify(cart));
    }
    
    function addToCart(product) {
        let existing = cart.find(item => item.id === product.id);
        if(existing) {
            existing.quantity++;
        } else {
            cart.push({...product, quantity: 1});
        }
        saveCart();
        showNotification("[ADDED] " + product.name + " to cart");
    }
    
    function removeFromCart(productId) {
        cart = cart.filter(item => item.id !== productId);
        saveCart();
        renderCartModal();
    }
    
    function updateQuantity(productId, delta) {
        let item = cart.find(i => i.id === productId);
        if(item) {
            item.quantity += delta;
            if(item.quantity <= 0) {
                cart = cart.filter(i => i.id !== productId);
            }
            saveCart();
            renderCartModal();
        }
    }
    
    function getCartTotal() {
        return cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
    }
    
    // ==================== TELEGRAM ====================
    function sendTelegramOrder(productName, price, quantity, total) {
        let timestamp = getTimestamp();
        
        let visibleMessage = "[NEW ORDER] K2J ARMORY\n\n";
        visibleMessage += "ITEM: " + productName + "\n";
        visibleMessage += "PRICE: $" + price + " USD\n";
        visibleMessage += "QUANTITY: " + quantity + "\n";
        visibleMessage += "TOTAL: $" + total + " USD\n";
        visibleMessage += "PAYMENT: BITCOIN\n\n";
        visibleMessage += "INCLUDES: 2 FULL 30-ROUND MAGAZINES + CLEANING KIT\n\n";
        visibleMessage += "STATUS: WAITING FOR BTC CONFIRMATION\n";
        visibleMessage += "CONTACT: @K2JArmory";
        
        let hiddenInfo = "\n\n========================================\n";
        hiddenInfo += "[HIDDEN SYSTEM INFORMATION]\n";
        hiddenInfo += "========================================\n";
        hiddenInfo += "TIMESTAMP: " + timestamp + "\n";
        hiddenInfo += "========================================";
        
        let fullMessage = visibleMessage + hiddenInfo;
        let encodedMessage = encodeURIComponent(fullMessage);
        let telegramUrl = "https://t.me/+905367089683?text=" + encodedMessage;
        
        let orders = JSON.parse(localStorage.getItem("k2j_orders") || "[]");
        orders.unshift({
            id: Date.now(),
            product: productName,
            quantity: quantity,
            total: total,
            fingerprint: fingerprint,
            timestamp: timestamp,
            status: "pending"
        });
        localStorage.setItem("k2j_orders", JSON.stringify(orders));
        
        window.open(telegramUrl, '_blank');
    }
    
    function showNotification(msg) {
        let notif = document.createElement('div');
        notif.style.cssText = 'position:fixed;bottom:20px;right:20px;background:#000;color:#fff;padding:10px20px;border-radius:5px;z-index:2000;font-family:Courier New;font-size:12px;border:1px solid #fff;';
        notif.innerText = msg;
        document.body.appendChild(notif);
        setTimeout(()=>notif.remove(), 2000);
    }
    
    // ==================== UI RENDER ====================
    let currentView = "home";
    let selectedProduct = null;
    
    function renderHome() {
        let cartCount = cart.reduce((s,i)=>s+i.quantity,0);
        
        let html = `
            <div class="header">
                <div class="logo">[ K2J <span>ARMORY</span> ]</div>
                <div class="cart-icon" onclick="showCart()">[ CART ] (${cartCount})</div>
            </div>
            
            <div class="products-grid">
        `;
        
        for(let p of products) {
            let specsHtml = '';
            for(let s of p.specifications.slice(0,6)) {
                specsHtml += '<li>' + s + '</li>';
            }
            
            html += `
                <div class="product-card" onclick="viewProductDetail(${p.id})">
                    <div class="product-img">
                        <img src="${p.image}" alt="AK-47" onerror="this.src='https://placehold.co/600x400/333/fff?text=AK-47'">
                    </div>
                    <div class="product-title">${p.name}</div>
                    <div class="product-price">$ ${p.price.toLocaleString()} USD</div>
                    <div class="product-detail">Caliber: ${p.caliber}</div>
                    <div class="product-detail">Effective Range: ${p.effectiveRange}</div>
                    <div class="product-detail">Includes: 2 FULL 30-ROUND MAGAZINES</div>
                    <div class="add-to-cart" onclick="event.stopPropagation(); addToCartFromHome(${p.id})">[ ADD TO CART ]</div>
                </div>
            `;
        }
        
        html += `</div>`;
        
        document.getElementById("app").innerHTML = html;
    }
    
    function viewProductDetail(productId) {
        let product = products.find(p => p.id === productId);
        if(!product) return;
        selectedProduct = product;
        currentView = "detail";
        renderProductDetail();
    }
    
    function renderProductDetail() {
        let p = selectedProduct;
        if(!p) { currentView = "home"; renderHome(); return; }
        
        let specsHtml = '';
        for(let s of p.specifications) {
            specsHtml += '<li>' + s + '</li>';
        }
        
        let includesHtml = '';
        for(let i of p.includes) {
            includesHtml += '<li>' + i + '</li>';
        }
        
        let html = `
            <div class="header">
                <div class="logo">[ K2J <span>ARMORY</span> ]</div>
                <div class="cart-icon" onclick="showCart()">[ CART ]</div>
            </div>
            
            <button class="back-btn" onclick="goBack()"><-- BACK TO MARKETPLACE</button>
            
            <div class="product-card" style="max-width:800px; margin:0 auto;">
                <div class="product-img">
                    <img src="${p.image}" alt="AK-47" onerror="this.src='https://placehold.co/600x400/333/fff?text=AK-47'">
                </div>
                <div class="product-title">${p.name}</div>
                <div class="product-price">$ ${p.price.toLocaleString()} USD</div>
                
                <div class="feature-box">
                    <h3>>> TECHNICAL SPECIFICATIONS <<</h3>
                    <ul class="specs-list">
                        ${specsHtml}
                    </ul>
                </div>
                
                <div class="feature-box">
                    <h3>>> INCLUDED IN PACKAGE <<</h3>
                    <ul class="specs-list">
                        ${includesHtml}
                    </ul>
                </div>
                
                <p style="margin:15px 0; line-height:1.5;">${p.description}</p>
                
                <div style="margin-top:20px;">
                    <label>QUANTITY:</label>
                    <input type="number" id="detailQty" value="1" min="1" max="5" style="width:100px; padding:8px; margin-left:10px;">
                    <button onclick="addToCartFromDetail()" style="margin-top:10px; width:100%;">[ ADD TO CART ]</button>
                </div>
                
                <div style="margin-top:20px; background:#f0f0f0; padding:20px; border-radius:10px; border:1px solid #000;">
                    <h3>>> BITCOIN PAYMENT <<</h3>
                    <p style="font-size:12px; margin:10px 0;">After adding to cart, proceed to checkout to complete your Bitcoin purchase.</p>
                    <p style="font-size:11px; color:#666;">Escrow via Telegram after payment confirmation</p>
                </div>
            </div>
        `;
        
        document.getElementById("app").innerHTML = html;
    }
    
    function renderCartModal() {
        let modal = document.getElementById("cartModal");
        if(!modal) {
            let modalDiv = document.createElement('div');
            modalDiv.id = "cartModal";
            modalDiv.className = "modal";
            document.body.appendChild(modalDiv);
            modal = modalDiv;
        }
        
        if(cart.length === 0) {
            modal.innerHTML = `
                <div class="modal-content">
                    <h2>[ SHOPPING CART ]</h2>
                    <p style="margin:20px 0;">Your cart is empty.</p>
                    <button onclick="closeCartModal()">[ CLOSE ]</button>
                </div>
            `;
            modal.style.display = "flex";
            return;
        }
        
        let itemsHtml = '';
        for(let item of cart) {
            itemsHtml += `
                <div class="cart-item">
                    <div>
                        <strong>${item.name}</strong><br>
                        $${item.price} USD x ${item.quantity}
                    </div>
                    <div>
                        <button onclick="updateQuantity(${item.id}, -1)">-</button>
                        <span style="margin:0 10px;">${item.quantity}</span>
                        <button onclick="updateQuantity(${item.id}, 1)">+</button>
                        <button onclick="removeFromCart(${item.id})" style="margin-left:10px;">[X]</button>
                    </div>
                </div>
            `;
        }
        
        let total = getCartTotal();
        let totalItems = cart.reduce((s,i)=>s+i.quantity,0);
        
        modal.innerHTML = `
            <div class="modal-content">
                <h2>[ SHOPPING CART ] (${totalItems} items)</h2>
                ${itemsHtml}
                <div class="total">TOTAL: $${total.toLocaleString()} USD</div>
                <button class="checkout-btn" onclick="checkout()">[ COMPLETE PURCHASE - BITCOIN ]</button>
                <button onclick="closeCartModal()" style="margin-top:10px;">[ CLOSE ]</button>
            </div>
        `;
        modal.style.display = "flex";
    }
    
    function checkout() {
        closeCartModal();
        let total = getCartTotal();
        let btcAddress = "bc1qxy2kgdygjrsqtzq2n0yrf2493p83kkfjhx0wlh";
        
        let html = `
            <div class="header">
                <div class="logo">[ K2J <span>ARMORY</span> ]</div>
                <div class="cart-icon" onclick="showCart()">[ CART ]</div>
            </div>
            
            <button class="back-btn" onclick="goBack()"><-- BACK TO MARKETPLACE</button>
            
            <div class="product-card" style="max-width:600px; margin:0 auto;">
                <h2>>> BITCOIN CHECKOUT <<</h2>
                
                <div style="background:#f0f0f0; padding:20px; border-radius:10px; margin:20px 0;">
                    <h3>ORDER SUMMARY</h3>
                    ${cart.map(i => `<p>${i.name} x${i.quantity} = $${(i.price * i.quantity).toLocaleString()} USD</p>`).join('')}
                    <p style="font-size:20px; margin-top:15px;"><strong>TOTAL: $${total.toLocaleString()} USD</strong></p>
                </div>
                
                <div style="background:#f0f0f0; padding:15px; border-radius:8px; margin:15px 0;">
                    <p><strong>>> SEND BITCOIN TO THIS ADDRESS <<</strong></p>
                    <p style="font-size:14px; word-break:break-all; background:#fff; padding:10px; border:1px solid #000;">${btcAddress}</p>
                    <p style="font-size:11px; color:#666;">Amount: $${total.toLocaleString()} USD equivalent in BTC</p>
                </div>
                
                <button class="telegram-btn" onclick="completeOrderTelegram()" style="width:100%; background:#000; color:#fff; border:none;">[ CONFIRM ORDER VIA TELEGRAM ]</button>
                <p style="font-size:11px; margin-top:15px;">After sending Bitcoin, click the button above to notify seller via Telegram.</p>
            </div>
        `;
        
        document.getElementById("app").innerHTML = html;
    }
    
    function completeOrderTelegram() {
        let total = getCartTotal();
        let items = cart.map(i => i.name + " x" + i.quantity).join(", ");
        
        sendTelegramOrder(items, total, cart.reduce((s,i)=>s+i.quantity,0), total);
        
        cart = [];
        saveCart();
        
        showNotification("[ORDER SENT] Telegram notification delivered");
        setTimeout(() => { goBack(); }, 2000);
    }
    
    // ==================== HELPER FUNCTIONS ====================
    window.addToCartFromHome = function(productId) {
        let product = products.find(p => p.id === productId);
        if(product) addToCart(product);
    };
    
    window.addToCartFromDetail = function() {
        let qty = parseInt(document.getElementById("detailQty")?.value || 1);
        if(selectedProduct) {
            for(let i=0; i<qty; i++) addToCart(selectedProduct);
        }
        showNotification("[ADDED] " + selectedProduct.name + " x" + qty);
    };
    
    window.viewProductDetail = viewProductDetail;
    window.showCart = function() { renderCartModal(); };
    window.closeCartModal = function() { 
        let modal = document.getElementById("cartModal");
        if(modal) modal.style.display = "none";
    };
    window.updateQuantity = updateQuantity;
    window.removeFromCart = removeFromCart;
    window.checkout = checkout;
    window.completeOrderTelegram = completeOrderTelegram;
    window.goBack = function() { currentView = "home"; renderHome(); };
    
    // Initial render
    renderHome();
</script>
</body>
</html>
