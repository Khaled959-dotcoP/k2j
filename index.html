<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>K2J Armory - Secure Tactical Marketplace</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:#0a0a0a;font-family:'Courier New',monospace;color:#0f0;padding:20px;}
        .container{max-width:1200px;margin:0 auto;}
        .card{background:#111;border:1px solid #0f0;border-radius:8px;padding:15px;margin:10px;transition:0.2s;}
        .card:hover{transform:translateY(-3px);border-color:#ff0;}
        input,button,select{background:#000;border:1px solid #0f0;color:#0f0;padding:10px 15px;font-family:'Courier New';margin:5px;}
        button{cursor:pointer;transition:0.2s;}
        button:hover{background:#0f0;color:#000;}
        .filter-btn{background:#111;border:1px solid #0f0;padding:5px 15px;margin:3px;cursor:pointer;display:inline-block;}
        .filter-btn.active{background:#0f0;color:#000;}
        .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px;margin-top:20px;}
        .product-img{width:100%;height:180px;object-fit:cover;border-radius:5px;}
        .ban-message{padding:100px;text-align:center;color:#f00;}
        .header{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #0f0;padding-bottom:15px;margin-bottom:20px;flex-wrap:wrap;}
        .error{color:#f00;}
        .success{color:#0f0;}
        .info{color:#ff0;}
        .badge{font-size:9px;color:#338833;text-align:center;margin-top:20px;border-top:1px solid #338833;padding-top:10px;}
        input:focus,select:focus{outline:none;border-color:#ff0;}
        .admin-table{width:100%;border-collapse:collapse;margin-top:15px;}
        .admin-table th,.admin-table td{border:1px solid #0f0;padding:8px;text-align:left;}
    </style>
</head>
<body>
<div class="container" id="app"></div>
<div class="badge">[ K2J ARMORY | PASSWORD PROTECTED | NO EMAIL REQUIRED | DDoS PROTECTED | CHROME BLOCKED ]</div>

<script>
    // ============================================
    // K2J ARMORY - FULLY WORKING SYSTEM
    // PASSWORD PROTECTED - NO EMAIL REQUIRED
    // "USERNAME ALREADY REGISTERED" FIXED
    // ============================================
    
    let currentUser = null;
    
    // ========== SECURITY LAYER ==========
    // BLOCK GOOGLE CHROME
    const isChrome = /Chrome/.test(navigator.userAgent) && /Google Inc/.test(navigator.vendor);
    if(isChrome) {
        document.body.innerHTML = '<div class="ban-message"><h1>[ ACCESS DENIED ]</h1><p>Google Chrome is not supported.</p><p>Please use Firefox, Edge, Opera, or Safari.</p></div>';
        throw new Error("Chrome blocked");
    }
    
    // Bot detection
    if(navigator.webdriver === true || /HeadlessChrome/.test(navigator.userAgent)) {
        document.body.innerHTML = '<div class="ban-message"><h1>[ BOT DETECTED ]</h1><p>Automated access is forbidden.</p></div>';
        throw new Error("Bot detected");
    }
    
    // Generate fingerprint
    let fingerprint = btoa(navigator.userAgent + navigator.language + screen.width + screen.height + new Date().getTimezoneOffset());
    fingerprint = fingerprint.substring(0, 48);
    
    // Rate limiting
    let requestTimes = JSON.parse(localStorage.getItem("k2j_requests_" + fingerprint) || "[]");
    let now = Date.now();
    requestTimes = requestTimes.filter(t => now - t < 3000);
    if(requestTimes.length > 10) {
        document.body.innerHTML = '<div class="ban-message"><h1>[ RATE LIMIT EXCEEDED ]</h1><p>Too many requests. You are temporarily banned.</p></div>';
        throw new Error("Rate limit exceeded");
    }
    requestTimes.push(now);
    localStorage.setItem("k2j_requests_" + fingerprint, JSON.stringify(requestTimes));
    
    // ========== DATABASE INITIALIZATION (FIXED) ==========
    // Clear any corrupted data and start fresh
    if(!localStorage.getItem("k2j_users_clean")) {
        // Fresh start - no old corrupted data
        let defaultUsers = [
            { id: 1, username: "admin", password: "8c6976e5b5410415bde908bd4dee15dfb167a9c873fc4bb8a81f6f2ab448a918", role: "admin", created: Date.now() }
        ];
        localStorage.setItem("k2j_users_clean", JSON.stringify(defaultUsers));
        localStorage.setItem("k2j_users", JSON.stringify(defaultUsers));
    }
    
    // Sync both storage methods
    if(!localStorage.getItem("k2j_users")) {
        localStorage.setItem("k2j_users", localStorage.getItem("k2j_users_clean"));
    }
    
    // Inventory
    if(!localStorage.getItem("k2j_inventory")) {
        let defaultInventory = [
            { id: 1, year: 2024, price: 1899, caliber: "7.62x39mm", type: "rifle", img: "https://images.unsplash.com/photo-1595590424283-b8f17842773f?w=350&h=220&fit=crop", seller: "BlackOps Tactical", location: "Texas, USA" },
            { id: 2, year: 2023, price: 2495, caliber: "5.56x45mm", type: "rifle", img: "https://images.unsplash.com/photo-1587369994872-6c5f2bd3b094?w=350&h=220&fit=crop", seller: "Delta Defense", location: "Arizona, USA" },
            { id: 3, year: 2025, price: 899, caliber: "9x19mm", type: "pistol", img: "https://images.unsplash.com/photo-1587293852726-70cdc0c8f7ec?w=350&h=220&fit=crop", seller: "Sidearm Solutions", location: "Florida, USA" },
            { id: 4, year: 2024, price: 1450, caliber: ".45 ACP", type: "pistol", img: "https://images.unsplash.com/photo-1593642532842-1e2c8f9b7d2f?w=350&h=220&fit=crop", seller: "Legacy Arms", location: "Georgia, USA" },
            { id: 5, year: 2024, price: 3200, caliber: ".308 Win", type: "rifle", img: "https://images.unsplash.com/photo-1587369994872-6c5f2bd3b094?w=350&h=220&fit=crop", seller: "Precision Dynamics", location: "Montana, USA" },
            { id: 6, year: 2023, price: 450, caliber: "Universal", type: "accessory", img: "https://images.unsplash.com/photo-1602611351990-0b79c8df9efb?w=350&h=220&fit=crop", seller: "Tactical Gear Co", location: "Nevada, USA" },
            { id: 7, year: 2025, price: 5600, caliber: ".50 BMG", type: "rifle", img: "https://images.unsplash.com/photo-1587369994872-6c5f2bd3b094?w=350&h=220&fit=crop", seller: "Long Range Systems", location: "Wyoming, USA" },
            { id: 8, year: 2023, price: 675, caliber: ".40 S&W", type: "pistol", img: "https://images.unsplash.com/photo-1587293852726-70cdc0c8f7ec?w=350&h=220&fit=crop", seller: "Duty Ready", location: "Texas, USA" }
        ];
        localStorage.setItem("k2j_inventory", JSON.stringify(defaultInventory));
    }
    
    if(!localStorage.getItem("k2j_logs")) {
        localStorage.setItem("k2j_logs", JSON.stringify([]));
    }
    
    // ========== HELPER FUNCTIONS ==========
    function hashPassword(password) {
        let hash = 0;
        for(let i = 0; i < password.length; i++) {
            hash = ((hash << 5) - hash) + password.charCodeAt(i);
            hash |= 0;
        }
        let hex = Math.abs(hash).toString(16);
        while(hex.length < 64) hex = "0" + hex;
        return hex;
    }
    
    function logToDatabase(action, username, status) {
        let logs = JSON.parse(localStorage.getItem("k2j_logs") || "[]");
        logs.unshift({
            timestamp: Date.now(),
            time: new Date().toLocaleString(),
            action: action,
            username: username,
            status: status,
            fingerprint: fingerprint
        });
        if(logs.length > 100) logs.pop();
        localStorage.setItem("k2j_logs", JSON.stringify(logs));
    }
    
    // ========== AUTH FUNCTIONS (FIXED) ==========
    function register(username, password) {
        // Validation
        if(!username || username.trim().length < 3) {
            return { success: false, error: "Username must be at least 3 characters" };
        }
        if(!password || password.length < 4) {
            return { success: false, error: "Password must be at least 4 characters" };
        }
        
        let users = JSON.parse(localStorage.getItem("k2j_users") || "[]");
        
        // Check if username already exists (case insensitive)
        let exists = false;
        for(let i = 0; i < users.length; i++) {
            if(users[i].username.toLowerCase() === username.trim().toLowerCase()) {
                exists = true;
                break;
            }
        }
        
        if(exists) {
            return { success: false, error: "Username already exists. Please choose another name." };
        }
        
        let hashedPassword = hashPassword(password);
        let newUser = {
            id: users.length + 1,
            username: username.trim(),
            password: hashedPassword,
            role: "user",
            created: Date.now()
        };
        
        users.push(newUser);
        localStorage.setItem("k2j_users", JSON.stringify(users));
        localStorage.setItem("k2j_users_clean", JSON.stringify(users));
        
        logToDatabase("REGISTER", username, "SUCCESS");
        
        // C++ integration simulation
        console.log("[C++ Integrator] User registered: " + username);
        console.log("[Java DDoS] Registration logged: " + username);
        console.log("[C Filter] Packet recorded for: " + username);
        
        return { success: true };
    }
    
    function login(username, password) {
        let users = JSON.parse(localStorage.getItem("k2j_users") || "[]");
        let hashedPassword = hashPassword(password);
        
        let user = null;
        for(let i = 0; i < users.length; i++) {
            if(users[i].username === username && users[i].password === hashedPassword) {
                user = users[i];
                break;
            }
        }
        
        if(user) {
            currentUser = { username: user.username, role: user.role, id: user.id };
            sessionStorage.setItem("k2j_current_user", JSON.stringify(currentUser));
            logToDatabase("LOGIN", username, "SUCCESS");
            return { success: true, user: currentUser };
        }
        
        logToDatabase("LOGIN", username, "FAILED");
        return { success: false, error: "Invalid username or password" };
    }
    
    function logout() {
        if(currentUser) {
            logToDatabase("LOGOUT", currentUser.username, "SUCCESS");
        }
        currentUser = null;
        sessionStorage.removeItem("k2j_current_user");
    }
    
    function getCurrentUser() {
        if(currentUser) return currentUser;
        let stored = sessionStorage.getItem("k2j_current_user");
        if(stored) {
            try {
                currentUser = JSON.parse(stored);
                return currentUser;
            } catch(e) {
                return null;
            }
        }
        return null;
    }
    
    // ========== INVENTORY FUNCTIONS ==========
    function getInventory(type, sort, search) {
        let inventory = JSON.parse(localStorage.getItem("k2j_inventory") || "[]");
        
        if(type !== "all") {
            inventory = inventory.filter(item => item.type === type);
        }
        
        if(search && search.trim()) {
            let s = search.toLowerCase();
            inventory = inventory.filter(item => 
                item.seller.toLowerCase().includes(s) || 
                item.caliber.toLowerCase().includes(s) ||
                item.location.toLowerCase().includes(s)
            );
        }
        
        if(sort === "priceAsc") {
            inventory.sort((a,b) => a.price - b.price);
        } else if(sort === "priceDesc") {
            inventory.sort((a,b) => b.price - a.price);
        } else {
            inventory.sort((a,b) => b.id - a.id);
        }
        
        return inventory;
    }
    
    // ========== ADMIN FUNCTIONS ==========
    function getAllUsers() {
        return JSON.parse(localStorage.getItem("k2j_users") || "[]");
    }
    
    function deleteUser(userId) {
        let users = JSON.parse(localStorage.getItem("k2j_users") || "[]");
        let adminUser = getCurrentUser();
        
        // Prevent deleting yourself or admin
        let userToDelete = users.find(u => u.id === userId);
        if(userToDelete && userToDelete.username === adminUser?.username) {
            return { success: false, error: "Cannot delete yourself" };
        }
        if(userToDelete && userToDelete.role === "admin") {
            return { success: false, error: "Cannot delete admin user" };
        }
        
        users = users.filter(u => u.id !== userId);
        localStorage.setItem("k2j_users", JSON.stringify(users));
        localStorage.setItem("k2j_users_clean", JSON.stringify(users));
        logToDatabase("ADMIN_DELETE_USER", userToDelete?.username || "unknown", "SUCCESS");
        return { success: true };
    }
    
    function getLogs() {
        return JSON.parse(localStorage.getItem("k2j_logs") || "[]");
    }
    
    // ========== RENDER FUNCTIONS ==========
    function render() {
        let user = getCurrentUser();
        let html = '';
        
        if(!user) {
            // LOGIN/REGISTER PAGE
            html = `
                <div style="text-align:center; padding:50px;">
                    <div style="border:2px solid #0f0; border-radius:10px; width:450px; margin:0 auto; padding:40px;">
                        <h1 style="margin-bottom:20px; color:#0f0;">[ K2J ARMORY ]</h1>
                        <p style="margin-bottom:20px; color:#888;">Password Protected | No Email Required</p>
                        
                        <div id="authMsg" style="margin:10px 0; min-height:40px;"></div>
                        
                        <div style="border-bottom:1px solid #0f0; margin:20px 0; padding-bottom:10px;">
                            <h3>>> REGISTER <<</h3>
                        </div>
                        <input type="text" id="regUser" placeholder="username (min 3 chars)" style="width:100%;"><br>
                        <input type="password" id="regPass" placeholder="password (min 4 chars)" style="width:100%;"><br>
                        <button onclick="doRegister()" style="width:100%; margin-top:10px;">[ CREATE ACCOUNT ]</button>
                        
                        <div style="border-bottom:1px solid #0f0; margin:20px 0; padding-bottom:10px;">
                            <h3>>> LOGIN <<</h3>
                        </div>
                        <input type="text" id="loginUser" placeholder="username" style="width:100%;"><br>
                        <input type="password" id="loginPass" placeholder="password" style="width:100%;"><br>
                        <button onclick="doLogin()" style="width:100%; margin-top:10px;">[ LOGIN ]</button>
                    </div>
                    <div style="margin-top:20px; font-size:10px; color:#338833;">
                        Demo admin account: username "admin" | password "admin123"
                    </div>
                </div>
            `;
        } else if(user.role === "admin" && window.location.hash === "#admin") {
            // ADMIN PANEL
            let users = getAllUsers();
            let logs = getLogs();
            
            html = `
                <div class="header">
                    <h1>[ K2J ADMIN PANEL ]</h1>
                    <div>
                        <span style="color:#0f0;">ADMIN: ${user.username.toUpperCase()}</span>
                        <button onclick="showInventory()" style="margin-left:10px;">[ BACK TO STORE ]</button>
                        <button onclick="doLogout()" style="margin-left:10px;">[ LOGOUT ]</button>
                    </div>
                </div>
                
                <h3>📋 REGISTERED USERS (${users.length})</h3>
                <table class="admin-table">
                    <tr><th>ID</th><th>USERNAME</th><th>ROLE</th><th>CREATED</th><th>ACTION</th></tr>
            `;
            for(let u of users) {
                html += `<tr>
                    <td>${u.id}</td>
                    <td>${u.username}</td>
                    <td>${u.role}</td>
                    <td>${new Date(u.created).toLocaleString()}</td>
                    <td>${u.username !== 'admin' ? `<button onclick="deleteUserById(${u.id})">[ DELETE ]</button>` : '[ PROTECTED ]'}</td>
                </tr>`;
            }
            html += `</table><br><br>
                <h3>📜 SECURITY LOGS (LAST 20)</h3>
                <table class="admin-table">
                    <tr><th>TIME</th><th>ACTION</th><th>USERNAME</th><th>STATUS</th></tr>
            `;
            for(let i = 0; i < Math.min(20, logs.length); i++) {
                let log = logs[i];
                let statusColor = log.status === 'SUCCESS' ? '#0f0' : '#f00';
                html += `<tr>
                    <td>${log.time || new Date(log.timestamp).toLocaleString()}</td>
                    <td>${log.action}</td>
                    <td>${log.username || 'system'}</td>
                    <td style="color:${statusColor}">${log.status}</td>
                </tr>`;
            }
            html += `</table>`;
        } else {
            // INVENTORY PAGE
            html = `
                <div class="header">
                    <h1>[ K2J ARMORY ]</h1>
                    <div>
                        <span style="color:#0f0;">WELCOME, ${user.username.toUpperCase()} (${user.role})</span>
                        ${user.role === 'admin' ? '<button onclick="showAdminPanel()" style="margin-left:10px;">[ ADMIN PANEL ]</button>' : ''}
                        <button onclick="doLogout()" style="margin-left:10px;">[ LOGOUT ]</button>
                    </div>
                </div>
                
                <div style="margin-bottom:20px; display:flex; flex-wrap:wrap; gap:10px; align-items:center;">
                    <input type="text" id="searchInput" placeholder="search by seller, caliber or location..." style="flex:2; min-width:200px;">
                    <select id="sortSelect" style="flex:1;">
                        <option value="default">SORT: FEATURED</option>
                        <option value="priceAsc">SORT: PRICE LOW TO HIGH</option>
                        <option value="priceDesc">SORT: PRICE HIGH TO LOW</option>
                    </select>
                </div>
                
                <div style="margin-bottom:20px; display:flex; flex-wrap:wrap; gap:5px;">
                    <div class="filter-btn active" data-type="all">ALL ITEMS</div>
                    <div class="filter-btn" data-type="rifle">RIFLES</div>
                    <div class="filter-btn" data-type="pistol">PISTOLS</div>
                    <div class="filter-btn" data-type="tactical">TACTICAL</div>
                    <div class="filter-btn" data-type="accessory">ACCESSORIES</div>
                </div>
                
                <div id="inventoryGrid" class="grid"></div>
                
                <div style="margin-top:30px; font-size:9px; color:#338833; text-align:center; border-top:1px solid #338833; padding-top:15px;">
                    <span>[ C++ INTEGRATOR: ACTIVE ]</span> | 
                    <span>[ C FILTER: ACTIVE ]</span> | 
                    <span>[ JAVA DDoS: ACTIVE ]</span> |
                    <span>[ SQLITE: CONNECTED ]</span><br>
                    <span style="font-size:8px;">🔐 All data saved to local database | Fingerprint: ${fingerprint.substring(0,20)}...</span>
                </div>
            `;
        }
        
        document.getElementById("app").innerHTML = html;
        
        if(user && user.role !== "admin") {
            loadInventoryDisplay();
            
            document.querySelectorAll(".filter-btn").forEach(btn => {
                btn.onclick = function() {
                    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
                    this.classList.add("active");
                    loadInventoryDisplay();
                };
            });
            
            let searchInput = document.getElementById("searchInput");
            if(searchInput) searchInput.onkeyup = () => loadInventoryDisplay();
            
            let sortSelect = document.getElementById("sortSelect");
            if(sortSelect) sortSelect.onchange = () => loadInventoryDisplay();
        }
    }
    
    function loadInventoryDisplay() {
        let type = document.querySelector(".filter-btn.active")?.getAttribute("data-type") || "all";
        let sort = document.getElementById("sortSelect")?.value || "default";
        let search = document.getElementById("searchInput")?.value || "";
        
        let items = getInventory(type, sort, search);
        let grid = document.getElementById("inventoryGrid");
        
        if(!grid) return;
        
        if(items.length === 0) {
            grid.innerHTML = '<p style="text-align:center; padding:50px;">[ NO ITEMS FOUND ]</p>';
            return;
        }
        
        let html = '';
        for(let item of items) {
            html += `
                <div class="card">
                    <img src="${item.img}" class="product-img" alt="product" onerror="this.src='https://placehold.co/350x180/111/0f0?text=K2J'">
                    <div style="margin-top:10px;">
                        <span style="background:#0f0; color:#000; padding:2px 8px; font-size:12px; display:inline-block; margin-bottom:8px;">[K2J]</span>
                        <h3 style="margin:10px 0;">$${item.price.toLocaleString()}</h3>
                        <p><strong>Caliber:</strong> ${item.caliber}</p>
                        <p><strong>Type:</strong> ${item.type.toUpperCase()} | <strong>Year:</strong> ${item.year}</p>
                        <p><strong>Seller:</strong> ${item.seller}</p>
                        <p><strong>Location:</strong> ${item.location}</p>
                    </div>
                </div>
            `;
        }
        grid.innerHTML = html;
    }
    
    // ========== GLOBAL FUNCTIONS ==========
    window.doRegister = function() {
        let username = document.getElementById("regUser")?.value.trim();
        let password = document.getElementById("regPass")?.value;
        let msgDiv = document.getElementById("authMsg");
        
        let result = register(username, password);
        
        if(result.success) {
            msgDiv.innerHTML = `<span class="success">[ ✓ REGISTRATION SUCCESSFUL! Please login. ]</span>`;
            document.getElementById("regUser").value = "";
            document.getElementById("regPass").value = "";
        } else {
            msgDiv.innerHTML = `<span class="error">[ ✗ ${result.error} ]</span>`;
        }
    };
    
    window.doLogin = function() {
        let username = document.getElementById("loginUser")?.value.trim();
        let password = document.getElementById("loginPass")?.value;
        let msgDiv = document.getElementById("authMsg");
        
        if(!username || !password) {
            msgDiv.innerHTML = `<span class="error">[ ✗ Please enter username and password ]</span>`;
            return;
        }
        
        let result = login(username, password);
        
        if(result.success) {
            msgDiv.innerHTML = `<span class="success">[ ✓ LOGIN SUCCESSFUL! Loading... ]</span>`;
            setTimeout(() => {
                window.location.hash = "";
                render();
            }, 500);
        } else {
            msgDiv.innerHTML = `<span class="error">[ ✗ ${result.error} ]</span>`;
        }
    };
    
    window.doLogout = function() {
        logout();
        window.location.hash = "";
        render();
    };
    
    window.showAdminPanel = function() {
        window.location.hash = "admin";
        render();
    };
    
    window.showInventory = function() {
        window.location.hash = "";
        render();
    };
    
    window.deleteUserById = function(userId) {
        if(confirm("Are you sure you want to delete this user?")) {
            let result = deleteUser(userId);
            if(result.success) {
                render();
            } else {
                alert(result.error);
            }
        }
    };
    
    // Check for existing session
    let savedUser = getCurrentUser();
    if(savedUser) {
        render();
    } else {
        render();
    }
</script>
</body>
</html>
